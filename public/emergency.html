<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Información de Emergencia — Pakumi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: "#22c55e", hover: "#16a34a" },
            alert: { DEFAULT: "#ef4444", soft: "#fee2e2" },
          },
        },
      },
    };
  </script>

  <!-- Firebase compat SDK (firestore only — no auth needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyC8JAP9Hoecdw1Ffsn4znJgXxaiJCI2B-s",
      authDomain: "pakumi-poc.firebaseapp.com",
      projectId: "pakumi-poc",
      storageBucket: "pakumi-poc.firebasestorage.app",
      messagingSenderId: "87897128692",
      appId: "1:87897128692:web:f088ee072ba83c09f9a8a1",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>
</head>
<body class="min-h-screen bg-white text-gray-800 antialiased flex flex-col">
  <main class="flex-1 flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <!-- Loading -->
      <div id="loadingState" class="text-center text-gray-500 py-12">
        Cargando información...
      </div>

      <!-- Not found -->
      <div id="notFoundState" class="hidden text-center py-12">
        <div class="text-6xl mb-4">🔍</div>
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Perfil no encontrado</h1>
        <p class="text-gray-600 mb-6">
          No pudimos encontrar la información de esta mascota.
        </p>
        <a
          href="/"
          class="inline-block bg-brand hover:bg-brand-hover text-white font-medium rounded-lg py-2 px-5"
        >
          Ir a Pakumi
        </a>
      </div>

      <!-- Content -->
      <article
        id="content"
        class="hidden bg-white border border-gray-200 rounded-2xl shadow-lg overflow-hidden"
      >
        <header class="bg-alert-soft border-b-4 border-alert px-6 py-5 text-center">
          <p class="text-alert font-bold uppercase tracking-wide text-sm">
            🆘 Información de Emergencia
          </p>
        </header>

        <div class="px-6 py-6 space-y-5">
          <div class="text-center">
            <h1 id="petName" class="text-4xl font-bold text-gray-900"></h1>
            <p id="petMeta" class="text-gray-600 mt-1"></p>
          </div>

          <div id="conditionBox" class="hidden bg-yellow-50 border border-yellow-300 rounded-lg p-4">
            <p class="text-xs font-semibold text-yellow-900 uppercase tracking-wide mb-1">
              ⚠️ Condiciones o alergias
            </p>
            <p id="conditionText" class="text-yellow-900 text-sm"></p>
          </div>

          <div class="border-t border-gray-100 pt-5">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">
              Dueño
            </p>
            <p id="ownerName" class="text-lg text-gray-900 font-medium"></p>
          </div>

          <a
            id="contactBtn"
            href="#"
            target="_blank"
            rel="noopener"
            class="block w-full text-center bg-brand hover:bg-brand-hover text-white font-semibold text-lg rounded-xl py-4 transition shadow-md"
          >
            📱 Contactar al dueño
          </a>
        </div>
      </article>
    </div>
  </main>

  <footer class="py-6 text-center text-xs text-gray-400">
    Información provista por
    <span class="font-semibold text-gray-500">Pakumi 🐾</span>
    — Plataforma de salud para mascotas
  </footer>

  <script src="js/emergency.js"></script>
</body>
</html>
